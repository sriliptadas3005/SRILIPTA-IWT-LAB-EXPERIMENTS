<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ul>
    <script>
        const items=document.getElementsByTagName("li");
        for(let i=0;i<items.length;i++){
            document.write(items[i],innerHTML);
        }
    </script>
</body>
</html>
