<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lab 13 Experiment 9</title>
    <script>
       function generateFibonacci(n){
        let arr=new Array();
        let i=0
        if(n==0)
       {
        return n;
       }
       else{
        let a=0,b=1;
        arr[i]=a;
        i++;
        arr[i]=b;
        while(a<=n){
            let c=a+b;
            i++;
            arr[i]=c;
            a=b;
            b=c;
        }
        return arr;
       }
       }
       let n=9;
       document.write(generateFibonacci(n));
    </script>
</head>
