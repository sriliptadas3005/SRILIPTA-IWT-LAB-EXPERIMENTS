<!DOCTYPE html>
<html lang="en">
<head>
    <title>Change Background Color</title>
    <style>
        #colorBox {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button onclick="changeColor('red')">Red</button>
    <button onclick="changeColor('green')">Green</button>
    <button onclick="changeColor('blue')">Blue</button>

    <div id="colorBox"></div>

    <script>
        function changeColor(color) {
            let confirmChange = confirm("Do you really want to change the background color to " + color + "?");

            if (confirmChange) {
                document.getElementById("colorBox").style.backgroundColor = color;
            }
        }
    </script>

</body>
</html>
