<!DOCTYPE html>

<head>
    <title>Lab 13 Experiment 9</title>
    <script>
       function Reverse(arr){
        let arr1=new Array();
        let i=0,j=0;
        for(i=arr.length-1;i>=0;i--){
            arr1[j]=arr[i]
            j++;
        }
        return arr1;
    }
    let arr=[3,5,2,6,9,8,7,1];
    document.write(Reverse(arr));
    </script>
</head>
