<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lab 13 Experiment 4</title>
    <script>
        let a=new Array(30,5,6,23,5);
        let large=-Infinity,s=-Infinity;
        for(let i=0;i<5;i++)
        {
            if(large<a[i])
            {
                s=large;
                large=a[i];
            }
            else if(a[i]>s && a[i]!=large)
            {
                s=a[i];
            }
        }
        document.write("Second Largest element is "+s+"<br>");
    </script>
</head>

</body>
</html>
