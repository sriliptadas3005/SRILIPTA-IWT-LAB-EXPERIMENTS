<head>
    <title>Lab 13 Experiment 4</title>
    <script>
        let arr = [1, 2, 3, 2, 4, 2, 5];
        let element = 2;
        let count = 0;
        for (let i = 0; i < arr.length; i++) {
            if (arr[i] === element) {
                count++;
            }
        }
        document.write(element + " occurs " + count + " times");
    </script>
