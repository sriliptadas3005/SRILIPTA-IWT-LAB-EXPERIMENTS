<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lab 13 Experiment 9</title>
    <script>
       function oddEven(arr){
        let a=new Array();
        let b=new Array();
        let j=0,k=0;
        for(i=0;i<arr.length;i++){
            if(arr[i]%2==0){
                a[j]=arr[i];
                j++;
            }
            else if(arr[i]%2!=0){
                b[k]=arr[i];
                k++;
            }
        }
        return [a,b];
        }
        let arr=[3,7,2,8,4,5,0,9];
        let [arr1,arr2]=oddEven(arr);
        document.write(arr1,"<br>");
        document.write(arr2);
    </script>
</head>

</html>
