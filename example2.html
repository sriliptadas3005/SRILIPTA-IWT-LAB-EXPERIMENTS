<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function fun(){
            //let name=document.getElementById("text1").value;
            //document.write(name);
            let a=parseInt(document.getElementById("text2").value);
            let b=parseInt(document.getElementById("text3").value);
            document.write("Result is ",+(a+b));
        }

<body>

    <input type="text" id="text1" placeholder="Enter name"><br>

    <input type="button"  value="submit" onclick="fun()"><br>
</body>
</html>
