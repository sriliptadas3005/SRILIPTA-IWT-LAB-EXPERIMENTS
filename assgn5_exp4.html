<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lab 13 Experiment 4</title>
    <script>
        let a=new Array(30,5,6,23,5);
        let sum=0,large=a[0],small=a[0];
        for(let i=0;i<5;i++)
        {
            sum=sum+a[i];
        }
        document.write("Sum is "+sum+"<br>");
        avg=sum/5;
        document.write("Average is "+avg+"<br>");
        for(let i=0;i<5;i++)
        {
            if(large<a[i])
            {
                large=a[i];
            }
            else if(small>a[i])
            {
                small=a[i]
            }
        }
        document.write("Largest element is "+large+"<br>");
        document.write("smallest element is "+small+"<br>");
    </script>
</head>
